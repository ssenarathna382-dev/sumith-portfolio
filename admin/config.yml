backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "pages"
    label: "Website Content"
    files:
      - label: "Home Page"
        name: "home"
        file: "content/home.json"
        format: "json"
        fields:
          - { label: "Hello Text", name: "hello", widget: "string" }
          - { label: "First Name", name: "firstName", widget: "string" }
          - { label: "Last Name", name: "lastName", widget: "string" }
          - { label: "Main Role", name: "roleMain", widget: "string" }
          - { label: "Role Accent", name: "roleAccent", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }

      - label: "About Page"
        name: "about"
        file: "content/about.json"
        format: "json"
        fields:
          - label: "Paragraphs"
            name: "paragraphs"
            widget: "list"
            field:
              label: "Paragraph"
              name: "paragraph"
              widget: "text"

      - label: "Education"
        name: "education"
        file: "content/education.json"
        format: "json"
        fields:
          - { label: "Section Title", name: "sectionTitle", widget: "string" }

          - label: "Education Items"
            name: "items"
            widget: "list"
            summary: "{{fields.degree}}"
            fields:
              - { label: "Degree / Qualification", name: "degree", widget: "string" }
              - { label: "Institution", name: "institution", widget: "string" }
              - { label: "Period / Status", name: "period", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

              - label: "Highlights"
                name: "highlights"
                widget: "list"
                required: false
                field:
                  label: "Highlight"
                  name: "highlight"
                  widget: "string"

      - label: "Skills Section"
        name: "skills"
        file: "content/skills.json"
        format: "json"
        fields:
          - { label: "Section Title", name: "sectionTitle", widget: "string" }
          - label: "Skill Categories"
            name: "categories"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Category Title", name: "title", widget: "string" }
              - label: "Skills"
                name: "skills"
                widget: "list"
                field:
                  label: "Skill"
                  name: "skill"
                  widget: "string"

      - label: "Featured Projects Section"
        name: "featured_projects"
        file: "content/featured-projects.json"
        format: "json"
        fields:
          - { label: "Section Title", name: "sectionTitle", widget: "string" }
          - label: "Projects"
            name: "projects"
            widget: "list"
            min: 3
            max: 3
            summary: "{{fields.title}}"
            fields:
              - { label: "Project Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Project Image", name: "image", widget: "image" }
              - { label: "Button Text", name: "buttonText", widget: "string" }
              - { label: "Button Link", name: "buttonLink", widget: "string" }

      - label: "Research Section"
        name: "research"
        file: "content/research.json"
        format: "json"
        fields:
          - { label: "Section Title", name: "sectionTitle", widget: "string" }
          - { label: "Home Title", name: "homeTitle", widget: "string" }
          - { label: "Home Image", name: "homeImage", widget: "image", required: false }
          - { label: "Home Description", name: "homeDescription", widget: "text" }
          - { label: "Button Text", name: "buttonText", widget: "string" }
          - { label: "Detail Page Title", name: "detailTitle", widget: "string" }
          - { label: "Detail Subtitle", name: "detailSubtitle", widget: "string" }
          - label: "Detailed Description"
            name: "detailDescription"
            widget: "list"
            field:
              label: "Paragraph"
              name: "paragraph"
              widget: "text"
          - { label: "Tools", name: "tools", widget: "string" }
          - { label: "Research Areas", name: "researchAreas", widget: "string" }
          - { label: "Future Direction", name: "futureDirection", widget: "text" }
          - label: "Research Images"
            name: "images"
            widget: "list"
            required: false
            summary: "{{fields.caption}}"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Caption", name: "caption", widget: "string", required: false }
      - label: "Achievements & Activities"
        name: "activities"
        file: "content/activities.json"
        format: "json"
        fields:
          - { label: "Section Title", name: "sectionTitle", widget: "string" }
          - { label: "Section Description", name: "sectionDescription", widget: "text" }
          - { label: "Button Text", name: "buttonText", widget: "string" }

          - label: "Activities"
            name: "activities"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Category", name: "category", widget: "string", required: false }
              - { label: "Date / Year", name: "date", widget: "string", required: false }
              - { label: "Location", name: "location", widget: "string", required: false }
              - { label: "Cover Image", name: "coverImage", widget: "image", required: false }
              - { label: "Description", name: "description", widget: "text" }

              - label: "Activity Images"
                name: "images"
                widget: "list"
                required: false
                summary: "{{fields.caption}}"
                fields:
                  - { label: "Image", name: "image", widget: "image" }
                  - { label: "Caption", name: "caption", widget: "string", required: false }

      - label: "Professional Experience"
        name: "experience"
        file: "content/experience.json"
        format: "json"
        fields:
          - { label: "Section Title", name: "sectionTitle", widget: "string" }

          - label: "Experience Items"
            name: "experiences"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Job Title", name: "title", widget: "string" }
              - { label: "Organization / Company", name: "organization", widget: "string", required: false }
              - { label: "Period", name: "period", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text" }

      - label: "Contact"
        name: "contact"
        file: "content/contact.json"
        format: "json"
        fields:
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Phone Number", name: "phoneNumber", widget: "string" }
          - { label: "WhatsApp Message", name: "whatsappMessage", widget: "text", required: false }
          - { label: "LinkedIn URL", name: "linkedinUrl", widget: "string" }
          - { label: "LinkedIn Text", name: "linkedinText", widget: "string" }
          - { label: "Fiverr URL", name: "fiverrUrl", widget: "string" }
          - { label: "Fiverr Text", name: "fiverrText", widget: "string" }
          - { label: "Location", name: "location", widget: "string" }

      - label: "BIM Projects"
        name: "bim_projects"
        file: "content/bim-projects.json"
        format: "json"
        fields:
          - label: "Projects"
            name: "projects"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Cover Image", name: "image", widget: "image", required: false }
              - label: "Project Images"
                name: "images"
                widget: "list"
                required: false
                summary: "{{fields.caption}}"
                fields:
                  - { label: "Image", name: "image", widget: "image" }
                  - { label: "Caption", name: "caption", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Software", name: "software", widget: "string" }

      - label: "Structural Projects"
        name: "structural_projects"
        file: "content/structural-projects.json"
        format: "json"
        fields:
          - label: "Projects"
            name: "projects"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Cover Image", name: "image", widget: "image", required: false }
              - label: "Project Images"
                name: "images"
                widget: "list"
                required: false
                summary: "{{fields.caption}}"
                fields:
                  - { label: "Image", name: "image", widget: "image" }
                  - { label: "Caption", name: "caption", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Software", name: "software", widget: "string" }

      - label: "CAD Projects"
        name: "cad_projects"
        file: "content/cad-projects.json"
        format: "json"
        fields:
          - label: "Projects"
            name: "projects"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Cover Image", name: "image", widget: "image", required: false }
              - label: "Project Images"
                name: "images"
                widget: "list"
                required: false
                summary: "{{fields.caption}}"
                fields:
                  - { label: "Image", name: "image", widget: "image" }
                  - { label: "Caption", name: "caption", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Software", name: "software", widget: "string" }
